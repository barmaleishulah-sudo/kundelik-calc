<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Kundelik Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #1e1e24;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px 0;
    }
    .calculator {
      background: #2a2a35;
      color: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
      width: 90%;
      margin: auto;
    }
    p {
      margin: 15px 0 5px 0;
      font-weight: 600;
      color: #ccc;
      text-align: left;
      padding-left: 5%;
    }
    input {
      width: 90%;
      padding: 12px;
      background: #3b3b4f;
      border: 2px solid #4a4a6a;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: #007bff;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 14px 25px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      width: 95%;
      margin-top: 20px;
      font-weight: bold;
    }
    button:hover {
      background-color: #0056b3;
    }
    .result-box {
      margin-top: 25px;
      font-size: 16px;
      line-height: 1.6;
      background: #1e1e24;
      padding: 15px;
      border-radius: 10px;
    }
    .grade-5 { color: #28a745; font-size: 24px; font-weight: bold; }
    .grade-4 { color: #ffc107; font-size: 24px; font-weight: bold; }
    .grade-3 { color: #fd7e14; font-size: 24px; font-weight: bold; }
    .grade-2 { color: #dc3545; font-size: 24px; font-weight: bold; }
    .info { color: #17a2b8; font-weight: bold; }
  </style>
</head>
<body>

<div class="calculator">
  <h2>Advanced Kundelik Calc 🎓</h2>
  
  <p>Formative points (daily 1-10):</p>
  <input type="text" id="formativeInput" placeholder="Example: 10, 8, 9, 7">
  
  <p>SOR points (earned/max):</p>
  <input type="text" id="sorInput" placeholder="Example: 7/10, 12/15, 5/7">
  
  <p>SOCH points (earned/max):</p>
  <input type="text" id="sochInput" placeholder="Example: 18/20">
  
  <button onclick="calculateFlexiblePoints()">Calculate</button>
  
  <div id="result" class="result-box"></div>
</div>

<script>
function calculateFlexiblePoints() {
  const formIn = document.getElementById('formativeInput').value;
  const sorIn = document.getElementById('sorInput').value;
  const sochIn = document.getElementById('sochInput').value;
  const resultDiv = document.getElementById('result');
  
  const formative = formIn.match(/\b(10|[1-9])\b/g) ? formIn.match(/\b(10|[1-9])\b/g).map(Number) : [];
  
  const parseFractions = (str) => {
    const matches = str.match(/\b\d+\/\d+\b/g);
    if (!matches) return [];
    
    let totalEarned = 0;
    let totalMax = 0;
    
    matches.forEach(frac => {
      const [earned, max] = frac.split('/').map(Number);
      if (max > 0 && earned <= max) {
        totalEarned += earned;
        totalMax += max;
      }
    });
    
    return totalMax > 0 ? (totalEarned / totalMax) * 10 : null;
  };
  
  if (formative.length === 0) {
    resultDiv.innerHTML = "Please enter at least one formative point (1-10).";
    return;
  }
  
  let formAvg = formative.reduce((a,b)=>a+b, 0) / formative.length;
  let sorAvg = parseFractions(sorIn);
  if (sorAvg === null) sorAvg = formAvg;
  
  let sochAvg = parseFractions(sochIn);
  if (sochAvg === null) sochAvg = formAvg;
  
  let totalScore = (formAvg * 0.25) + (sorAvg * 0.25) + (sochAvg * 0.5);
  
  const convertToGrade = (score) => {
    if (score >= 8.5) return { num: 5, css: "grade-5" };
    if (score >= 6.5) return { num: 4, css: "grade-4" };
    if (score >= 3.5) return { num: 3, css: "grade-3" };
    return { num: 2, css: "grade-2" };
  };
  
  let currentGrade = convertToGrade(totalScore);
  
  if (totalScore >= 8.5) {
    resultDiv.innerHTML = `
      Quarter Score: <strong>${totalScore.toFixed(2)}</strong> / 10<br>
      Grade: <span class="${currentGrade.css}">${currentGrade.num} 🎉</span>
    `;
    return;
  }
  
  let tempFormative = [...formative];
  let additionalTens = 0;
  let newTotal = totalScore;
  
  while (newTotal < 8.5 && additionalTens < 30) {
    tempFormative.push(10);
    additionalTens++;
    let newFormAvg = tempFormative.reduce((a,b)=>a+b, 0) / tempFormative.length;
    newTotal = (newFormAvg * 0.25) + (sorAvg * 0.25) + (sochAvg * 0.5);
  }
  
  if (newTotal >= 8.5) {
    resultDiv.innerHTML = `
      Quarter Score: <strong>${totalScore.toFixed(2)}</strong> / 10<br>
      Current Grade: <span class="${currentGrade.css}">${currentGrade.num}</span><br><br>
      <span class="info">To get a "5", you need <strong>${additionalTens}</strong> more 10s in daily lessons! 🚀</span>
    `;
  } else {
    resultDiv.innerHTML = `
      Quarter Score: <strong>${totalScore.toFixed(2)}</strong> / 10<br>
      Current Grade: <span class="${currentGrade.css}">${currentGrade.num}</span><br><br>
      <span class="grade-2">Daily 10s won't save it. You need higher scores in SOR or SOCH! ⚠️</span>
    `;
  }
}
</script>

</body>
</html>
